name: 🚀 Deploy CRM to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # ── 1. Create / find Vercel project ──────────────────────────────────
      - name: Create or find Vercel project
        id: vproject
        run: |
          FIND=$(curl -s "https://api.vercel.com/v9/projects/crm-claudia-pacheco" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          echo "Find response: $FIND"
          PROJ_ID=$(echo "$FIND" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")

          if [ -z "$PROJ_ID" ]; then
            echo "Project not found, creating..."
            CREATE=$(curl -s -X POST "https://api.vercel.com/v10/projects" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"crm-claudia-pacheco","framework":"nextjs"}')
            echo "Create response: $CREATE"
            PROJ_ID=$(echo "$CREATE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")
          fi

          if [ -z "$PROJ_ID" ]; then
            echo "❌ Could not create or find Vercel project"
            exit 1
          fi

          echo "project_id=$PROJ_ID" >> $GITHUB_OUTPUT
          echo "✅ Project ID: $PROJ_ID"

          USER_RESP=$(curl -s "https://api.vercel.com/v2/user" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          USER_ID=$(echo "$USER_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['user']['id'])" 2>/dev/null || echo "")

          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' "$PROJ_ID" "$USER_ID" > .vercel/project.json
          echo "✅ .vercel/project.json: $(cat .vercel/project.json)"

      # ── 2. Create Vercel Postgres store ──────────────────────────────────
      - name: Create Vercel Postgres store
        id: pgstore
        run: |
          STORES=$(curl -s "https://api.vercel.com/v1/storage/stores" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          echo "Existing stores: $STORES"

          STORE_ID=$(echo "$STORES" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for s in d.get('stores',[]):
            if s.get('name') == 'crm-cp-db':
              print(s['id']); break
          " 2>/dev/null || echo "")

          if [ -z "$STORE_ID" ]; then
            echo "Creating Postgres store..."
            CREATE=$(curl -s -X POST "https://api.vercel.com/v1/storage/stores" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"crm-cp-db","type":"postgres","regions":["iad1"]}')
            echo "Store created: $CREATE"
            STORE_ID=$(echo "$CREATE" | python3 -c "
            import sys,json
            d=json.load(sys.stdin)
            print(d.get('id','') or d.get('store',{}).get('id',''))
            " 2>/dev/null || echo "")
          fi

          echo "store_id=$STORE_ID" >> $GITHUB_OUTPUT
          echo "✅ Store ID: $STORE_ID"

      # ── 3. Connect store to project (production + preview + development) ──
      - name: Connect Postgres store to project
        run: |
          STORE_ID="${{ steps.pgstore.outputs.store_id }}"
          PROJ_ID="${{ steps.vproject.outputs.project_id }}"
          if [ -z "$STORE_ID" ]; then echo "No store ID, skipping"; exit 0; fi
          RESP=$(curl -s -X POST \
            "https://api.vercel.com/v1/storage/stores/${STORE_ID}/connect" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"projectId\":\"${PROJ_ID}\",\"environments\":[\"production\",\"preview\",\"development\"]}")
          echo "Connect response: $RESP"

      # ── 4. Fetch env vars via API (try all targets) ───────────────────────
      - name: Pull Vercel env vars
        run: |
          PROJ_ID="${{ steps.vproject.outputs.project_id }}"
          rm -f .env.production

          for i in 1 2 3 4 5 6 7 8 9; do
            echo "=== Attempt $i: polling for Postgres env vars ==="
            FOUND=0

            for TARGET in production preview development ""; do
              LABEL="${TARGET:-all}"
              if [ -n "$TARGET" ]; then
                ENV_LIST=$(curl -s "https://api.vercel.com/v10/projects/${PROJ_ID}/env?target=${TARGET}" \
                  -H "Authorization: Bearer $VERCEL_TOKEN")
              else
                ENV_LIST=$(curl -s "https://api.vercel.com/v10/projects/${PROJ_ID}/env" \
                  -H "Authorization: Bearer $VERCEL_TOKEN")
              fi

              PG_COUNT=$(echo "$ENV_LIST" | python3 -c "
              import sys,json
              envs=json.load(sys.stdin).get('envs',[])
              print(sum(1 for e in envs if e['key'].startswith('POSTGRES')))
              " 2>/dev/null || echo "0")

              echo "  target=$LABEL -> $PG_COUNT POSTGRES vars"

              if [ "$PG_COUNT" -gt "0" ]; then
                echo "✅ Found $PG_COUNT Postgres vars for target=$LABEL, decrypting..."
                echo "$ENV_LIST" | python3 -c "
                import sys,json
                for e in json.load(sys.stdin).get('envs',[]):
                  print(e['id'] + ' ' + e['key'])
                " 2>/dev/null | while read ENVID ENVKEY; do
                  VAL=$(curl -s "https://api.vercel.com/v10/projects/${PROJ_ID}/env/${ENVID}" \
                    -H "Authorization: Bearer $VERCEL_TOKEN" | \
                    python3 -c "import sys,json; print(json.load(sys.stdin).get('value',''))" 2>/dev/null || echo "")
                  echo "${ENVKEY}=${VAL}" >> .env.production
                done
                FOUND=1
                break
              fi
            done

            if [ "$FOUND" -eq "1" ]; then break; fi

            echo "⏳ No Postgres vars yet (attempt $i/9), waiting 20s..."
            sleep 20
          done

          echo "=== Pulled keys ==="
          grep -v "^#" .env.production 2>/dev/null | cut -d'=' -f1 || true

      # ── 5. Push schema & seed database ───────────────────────────────────
      - name: Setup database
        run: |
          set -a; source .env.production 2>/dev/null || true; set +a
          DB_URL="${POSTGRES_PRISMA_URL:-${POSTGRES_URL:-$DATABASE_URL}}"
          if [ -z "$DB_URL" ]; then
            echo "❌ No DB URL! Contents of .env.production:"
            cat .env.production
            exit 1
          fi
          echo "✅ DB URL found: ${DB_URL:0:40}..."
          DATABASE_URL="$DB_URL" npx prisma db push --accept-data-loss
          DATABASE_URL="$DB_URL" npx tsx prisma/seed.ts || echo "⚠️ Seed skipped (already seeded)"

      # ── 6. Set AUTH_SECRET ───────────────────────────────────────────────
      - name: Set AUTH_SECRET
        run: |
          PROJ_ID="${{ steps.vproject.outputs.project_id }}"
          AUTH_SECRET=$(openssl rand -base64 32)
          curl -s -X DELETE \
            "https://api.vercel.com/v10/projects/${PROJ_ID}/env?key=AUTH_SECRET" \
            -H "Authorization: Bearer $VERCEL_TOKEN" || true
          curl -s -X POST \
            "https://api.vercel.com/v10/projects/${PROJ_ID}/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"AUTH_SECRET\",\"value\":\"${AUTH_SECRET}\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}"
          echo "✅ AUTH_SECRET set"

      # ── 7. First deploy ──────────────────────────────────────────────────
      - name: Deploy to Vercel (first pass)
        id: deploy1
        run: |
          OUTPUT=$(vercel deploy --prod --token "$VERCEL_TOKEN" --yes < /dev/null 2>&1)
          echo "$OUTPUT"
          DEPLOY_URL=$(echo "$OUTPUT" | grep -Eo "https://[a-z0-9._-]+\.vercel\.app" | tail -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deploy URL: $DEPLOY_URL"

      # ── 8. Set NEXTAUTH_URL then final deploy ────────────────────────────
      - name: Set NEXTAUTH_URL & final deploy
        run: |
          PROJ_ID="${{ steps.vproject.outputs.project_id }}"
          DEPLOY_URL="${{ steps.deploy1.outputs.url }}"

          PROD_ALIAS=$(curl -s "https://api.vercel.com/v9/projects/${PROJ_ID}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for a in d.get('alias',[]):
            dom=a.get('domain','')
            if dom.endswith('vercel.app') and 'deployment' not in dom:
              print('https://'+dom); break
          " 2>/dev/null || echo "$DEPLOY_URL")

          NEXTAUTH_URL="${PROD_ALIAS:-$DEPLOY_URL}"

          curl -s -X DELETE \
            "https://api.vercel.com/v10/projects/${PROJ_ID}/env?key=NEXTAUTH_URL" \
            -H "Authorization: Bearer $VERCEL_TOKEN" || true
          curl -s -X POST \
            "https://api.vercel.com/v10/projects/${PROJ_ID}/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"NEXTAUTH_URL\",\"value\":\"${NEXTAUTH_URL}\",\"type\":\"plain\",\"target\":[\"production\",\"preview\"]}"

          FINAL=$(vercel deploy --prod --token "$VERCEL_TOKEN" --yes < /dev/null 2>&1)
          FINAL_URL=$(echo "$FINAL" | grep -Eo "https://[a-z0-9._-]+\.vercel\.app" | tail -1)

          echo ""
          echo "════════════════════════════════════════════"
          echo "🌐  LIVE:   $FINAL_URL"
          echo "📧  Login:  admin@clinicacp.com"
          echo "🔑  Senha:  admin123"
          echo "════════════════════════════════════════════"
