name: ЁЯЪА Deploy CRM to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # тФАтФА 1. Find team + project тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
      - name: Create or find Vercel project
        id: vproject
        run: |
          TEAM_RESP=$(curl -s "https://api.vercel.com/v2/teams" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          TEAM_ID=$(echo "$TEAM_RESP" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          ts=d.get('teams',[])
          print(ts[0]['id'] if ts else '')
          " 2>/dev/null || echo "")

          FIND_URL="https://api.vercel.com/v9/projects/crm-claudia-pacheco"
          if [ -n "$TEAM_ID" ]; then FIND_URL="${FIND_URL}?teamId=${TEAM_ID}"; fi
          FIND=$(curl -s "$FIND_URL" -H "Authorization: Bearer $VERCEL_TOKEN")
          echo "Project find: $FIND"
          PROJ_ID=$(echo "$FIND" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")

          if [ -z "$PROJ_ID" ]; then
            CREATE_URL="https://api.vercel.com/v10/projects"
            if [ -n "$TEAM_ID" ]; then CREATE_URL="${CREATE_URL}?teamId=${TEAM_ID}"; fi
            CREATE=$(curl -s -X POST "$CREATE_URL" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"crm-claudia-pacheco","framework":"nextjs"}')
            echo "Project create: $CREATE"
            PROJ_ID=$(echo "$CREATE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")
          fi

          if [ -z "$PROJ_ID" ]; then echo "тЭМ No project"; exit 1; fi

          echo "project_id=$PROJ_ID" >> $GITHUB_OUTPUT
          echo "team_id=$TEAM_ID" >> $GITHUB_OUTPUT
          echo "тЬЕ Project: $PROJ_ID | Team: $TEAM_ID"

          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' "$PROJ_ID" "$TEAM_ID" > .vercel/project.json
          echo "тЬЕ project.json: $(cat .vercel/project.json)"

      # тФАтФА 2. Connect existing Neon store to this project тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
      - name: Connect Postgres store to project
        run: |
          TEAM_ID="${{ steps.vproject.outputs.team_id }}"
          PROJ_ID="${{ steps.vproject.outputs.project_id }}"

          LIST_URL="https://api.vercel.com/v1/storage/stores"
          if [ -n "$TEAM_ID" ]; then LIST_URL="${LIST_URL}?teamId=${TEAM_ID}"; fi
          STORES=$(curl -s "$LIST_URL" -H "Authorization: Bearer $VERCEL_TOKEN")

          STORE_ID=$(echo "$STORES" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for s in d.get('stores',[]):
            secrets=[x['name'] for x in s.get('secrets',[])]
            evars=[]
            for pm in s.get('projectsMetadata',[]):
              evars.extend(pm.get('environmentVariables',[]))
            if any(k.startswith('POSTGRES') or k=='DATABASE_URL' for k in secrets+evars):
              print(s['id']); break
          " 2>/dev/null || echo "")

          if [ -z "$STORE_ID" ]; then echo "No Postgres store found тАФ DB vars injected at build"; exit 0; fi
          echo "тЬЕ Found store: $STORE_ID"

          CONNECT_URL="https://api.vercel.com/v1/storage/stores/${STORE_ID}/connect"
          if [ -n "$TEAM_ID" ]; then CONNECT_URL="${CONNECT_URL}?teamId=${TEAM_ID}"; fi
          RESP=$(curl -s -X POST "$CONNECT_URL" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"projectId\":\"${PROJ_ID}\",\"environments\":[\"production\",\"preview\",\"development\"]}")
          echo "Connect response: $RESP"

      # тФАтФА 3. Set AUTH_SECRET тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
      - name: Set AUTH_SECRET
        run: |
          PROJ_ID="${{ steps.vproject.outputs.project_id }}"
          TEAM_ID="${{ steps.vproject.outputs.team_id }}"
          AUTH_SECRET=$(openssl rand -base64 32)
          TPARAM=""
          if [ -n "$TEAM_ID" ]; then TPARAM="?teamId=${TEAM_ID}"; fi

          curl -s -X DELETE \
            "https://api.vercel.com/v10/projects/${PROJ_ID}/env?key=AUTH_SECRET${TEAM_ID:+&teamId=${TEAM_ID}}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" || true
          curl -s -X POST \
            "https://api.vercel.com/v10/projects/${PROJ_ID}/env${TPARAM}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"AUTH_SECRET\",\"value\":\"${AUTH_SECRET}\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}"
          echo "тЬЕ AUTH_SECRET set"

      # тФАтФА 4. First deploy (build cmd runs: prisma db push + seed + next build)
      - name: Deploy to Vercel (first pass)
        id: deploy1
        run: |
          OUTPUT=$(vercel deploy --prod --token "$VERCEL_TOKEN" --yes < /dev/null 2>&1)
          echo "$OUTPUT"
          DEPLOY_URL=$(echo "$OUTPUT" | grep -Eo "https://[a-z0-9._-]+\.vercel\.app" | tail -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "тЬЕ Deploy URL: $DEPLOY_URL"

      # тФАтФА 5. Set NEXTAUTH_URL + final deploy тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
      - name: Set NEXTAUTH_URL & final deploy
        run: |
          PROJ_ID="${{ steps.vproject.outputs.project_id }}"
          TEAM_ID="${{ steps.vproject.outputs.team_id }}"
          DEPLOY_URL="${{ steps.deploy1.outputs.url }}"
          TPARAM=""
          if [ -n "$TEAM_ID" ]; then TPARAM="?teamId=${TEAM_ID}"; fi

          PROJ_URL="https://api.vercel.com/v9/projects/${PROJ_ID}${TPARAM}"
          PROD_ALIAS=$(curl -s "$PROJ_URL" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for a in d.get('alias',[]):
            dom=a.get('domain','')
            if dom.endswith('vercel.app') and 'deployment' not in dom:
              print('https://'+dom); break
          " 2>/dev/null || echo "$DEPLOY_URL")

          NEXTAUTH_URL="${PROD_ALIAS:-$DEPLOY_URL}"

          curl -s -X DELETE \
            "https://api.vercel.com/v10/projects/${PROJ_ID}/env?key=NEXTAUTH_URL${TEAM_ID:+&teamId=${TEAM_ID}}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" || true
          curl -s -X POST \
            "https://api.vercel.com/v10/projects/${PROJ_ID}/env${TPARAM}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"NEXTAUTH_URL\",\"value\":\"${NEXTAUTH_URL}\",\"type\":\"plain\",\"target\":[\"production\",\"preview\"]}"

          FINAL=$(vercel deploy --prod --token "$VERCEL_TOKEN" --yes < /dev/null 2>&1)
          FINAL_URL=$(echo "$FINAL" | grep -Eo "https://[a-z0-9._-]+\.vercel\.app" | tail -1)

          echo ""
          echo "тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР"
          echo "ЁЯМР  LIVE:   $FINAL_URL"
          echo "ЁЯУз  Login:  admin@clinicacp.com"
          echo "ЁЯФС  Senha:  admin123"
          echo "тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР"
